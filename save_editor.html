<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Editor Online</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-color: #2c2c2c;
            --primary-color: #007bff;
            --text-color: #f0f0f0;
            --border-color: #444;
            --input-bg: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-color);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--primary-color);
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .upload-area:hover {
            background-color: #333;
            border-color: var(--primary-color);
        }
        .upload-area p {
            margin: 0;
            font-size: 1.1em;
        }
        #file-input {
            display: none;
        }
        #status {
            text-align: center;
            margin-top: 15px;
            font-style: italic;
            color: #aaa;
        }
        #editor {
            margin-top: 25px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        .editor-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .editor-item label {
            flex-basis: 30%;
            margin-right: 10px;
            font-weight: bold;
            color: #ccc;
            word-wrap: break-word;
        }
        .editor-item input, .editor-item textarea {
            flex-grow: 1;
            width: auto;
            min-width: 65%;
            padding: 8px 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            font-size: 1em;
        }
        #download-btn {
            display: none;
            width: 100%;
            padding: 12px;
            font-size: 1.2em;
            font-weight: bold;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }
        #download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Save Editor Online</h1>
    <label for="file-input" class="upload-area">
        <p>Klik atau jatuhkan file di sini untuk mengunggah</p>
        <span id="file-name" style="font-size: 0.9em; color: #888;"></span>
    </label>
    <input type="file" id="file-input">
    
    <p id="status">Unggah file save (.rpgsave atau .save) untuk memulai.</p>
    
    <div id="editor"></div>
    
    <button id="download-btn">Unduh File yang Dimodifikasi</button>
</div>

                return mockData;
            } catch(e) {

<script>
    const fileInput = document.getElementById('file-input');
    const editorDiv = document.getElementById('editor');
    const downloadBtn = document.getElementById('download-btn');
    const statusP = document.getElementById('status');
    const fileNameSpan = document.getElementById('file-name');

    let originalFileName = 'file';
    let currentFormat = null;
    let saveData = null;

    fileInput.addEventListener('change', handleFileSelect);

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        originalFileName = file.name;
        fileNameSpan.textContent = `(${file.name})`;
        statusP.textContent = 'Mendeteksi format file...';
        editorDiv.innerHTML = '';
        downloadBtn.style.display = 'none';

        const reader = new FileReader();

        reader.onload = function(e) {
            const fileContent = e.target.result;
            
            try {
                if (originalFileName.endsWith('.rpgsave')) {
                    currentFormat = 'rpgmaker_mv';
                    statusP.textContent = 'Format RPG Maker MV terdeteksi. Mendekripsi...';
                    const decompressedJSON = LZString.decompressFromBase64(fileContent);
                    if (!decompressedJSON) throw new Error("Dekompresi gagal.");
                    saveData = JSON.parse(decompressedJSON);
                    populateRpgMakerEditor(saveData);

                } else if (originalFileName.endsWith('.save')) {
                    currentFormat = 'renpy';
                    statusP.textContent = 'Format Ren\'Py terdeteksi. Mem-parsing...';
                    // NOTE: This uses the SIMULATED JSPickle library.
                    saveData = JSPickle.loads(fileContent);
                    populateRenPyEditor(saveData);

                } else {
                    throw new Error("Format file tidak didukung.");
                }

                statusP.textContent = 'File berhasil dimuat. Anda bisa mulai mengedit.';
                downloadBtn.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusP.textContent = `Error: ${error.message}`;
                currentFormat = null;
            }
        };
        
        reader.onerror = function() {
            statusP.textContent = 'Gagal membaca file.';
        };
        
        // RPG Maker saves are text, Ren'Py saves are often read as binary string
        if (originalFileName.endsWith('.rpgsave')) {
            reader.readAsText(file);
        } else {
            reader.readAsBinaryString(file);
        }
    }

    function populateRpgMakerEditor(data) {
        const variables = data.variables?._data;
        if (variables && Array.isArray(variables)) {
            variables.slice(1).forEach((value, index) => {
                 createEditorItem(`variables[${index + 1}]`, value, `Variabel #${index + 1}`);
            });
        }
    }
    
    function populateRenPyEditor(data) {
       // Ren'Py saves are dictionaries. Let's find the most likely editable data.
       const editableData = data._save?.variables || data;
       for (const key in editableData) {
           if (Object.hasOwnProperty.call(editableData, key) && !key.startsWith('__')) {
               const value = editableData[key];
               // Only show simple editable types
               if (['string', 'number', 'boolean'].includes(typeof value)) {
                   createEditorItem(key, value, key);
               }
           }
       }
    }

    function createEditorItem(key, value, label) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'editor-item';

        const labelEl = document.createElement('label');
        labelEl.textContent = label || key;
        itemDiv.appendChild(labelEl);

        const inputEl = document.createElement('input');
        if (typeof value === 'boolean') {
            inputEl.type = 'checkbox';
            inputEl.checked = value;
        } else {
            inputEl.type = (typeof value === 'number') ? 'number' : 'text';
            inputEl.value = value;
        }
        
        inputEl.dataset.key = key;
        itemDiv.appendChild(inputEl);
        editorDiv.appendChild(itemDiv);
    }
    
    downloadBtn.addEventListener('click', () => {
        let finalData;
        try {
            if (currentFormat === 'rpgmaker_mv') {
                const inputs = editorDiv.querySelectorAll('[data-key]');
                let tempVariables = [null];
                inputs.forEach(input => {
                    const match = input.dataset.key.match(/variables\[(\d+)\]/);
                    if (match) {
                        const index = parseInt(match[1], 10);
                        const value = input.type === 'number' ? Number(input.value) : input.value;
                        tempVariables[index] = value;
                    }
                });
                let updatedData = JSON.parse(JSON.stringify(saveData));
                updatedData.variables._data = tempVariables;
                const updatedJSON = JSON.stringify(updatedData);
                finalData = LZString.compressToBase64(updatedJSON);
            } else if (currentFormat === 'renpy') {
                 // Update saveData object from editor inputs
                const inputs = editorDiv.querySelectorAll('[data-key]');
                let dataContainer = saveData._save?.variables || saveData;
                 inputs.forEach(input => {
                    const key = input.dataset.key;
                    if(input.type === 'checkbox'){
                         dataContainer[key] = input.checked;
                    } else if (input.type === 'number') {
                         dataContainer[key] = Number(input.value);
                    } else {
                         dataContainer[key] = input.value;
                    }
                 });
                // NOTE: This uses the SIMULATED JSPickle library.
                finalData = JSPickle.dumps(saveData);
            }

            if (!finalData) {
                throw new Error("Gagal memproses data untuk diunduh.");
            }

            const blob = new Blob([finalData], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = originalFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusP.textContent = 'File berhasil diunduh!';

        } catch (error) {
            console.error(error);
            statusP.textContent = `Error saat menyimpan: ${error.message}`;
        }
    });

</script>
</body>
</html>
